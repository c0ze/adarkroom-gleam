<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- The board is a fixed 700px column; phones fit it to the screen. -->
    <meta name="viewport" content="width=720" />
    <meta name="theme-color" content="#000000" />
    <title>A Dark Room</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/room.css" />
    <link rel="stylesheet" href="/css/outside.css" />
    <link rel="stylesheet" href="/css/path.css" />
    <link rel="stylesheet" href="/css/world.css" />
    <link rel="stylesheet" href="/css/ship.css" />
    <link rel="stylesheet" href="/css/fabricator.css" />
    <link rel="stylesheet" href="/css/space.css" />
    <style>
      /* The cooldown bar's clock (the original's jQuery animate). */
      @keyframes cooldownBar {
        from { width: 100%; }
        to { width: 0%; }
      }

      /* The accessibility pass: the port's action buttons and location tabs
         are real <button>s where the original used divs. The original's
         stylesheets (symlinked, untouched) qualify those rules with `div.`,
         so they are restated for buttons here — after first stripping the
         browser's button chrome so nothing else changes. Keyboard focus
         keeps the browser's default focus-visible outline. */
      button {
        display: block;
        box-sizing: content-box;
        -webkit-appearance: none;
        appearance: none;
        background: none;
        border: none;
        margin: 0;
        padding: 0;
        font: inherit;
        color: inherit;
        text-align: inherit;
      }

      /* main.css's div.headerButton — the location tabs. */
      button.headerButton {
        font-size: 17px;
        cursor: pointer;
        float: left;
        border-left: 1px solid black;
        margin-left: 10px;
        padding-left: 10px;
      }
      button.headerButton:hover {
        text-decoration: underline;
      }
      button.headerButton:first-child {
        border-left: none;
        margin-left: 0px;
        padding-left: 0px;
      }
      button.headerButton.selected, button.headerButton.selected:hover {
        cursor: default;
        text-decoration: underline;
      }

      /* main.css's div.button — every action button. */
      button.button {
        position: relative;
        text-align: center;
        border: 1px solid black;
        width: 100px;
        margin-bottom: 5px;
        padding: 5px 10px;
        cursor: pointer;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      button.button:hover {
        text-decoration: underline;
      }
      button.button.disabled, button.button.disabled:hover {
        cursor: default;
        border-color: #b2b2b2;
        color: #b2b2b2;
        text-decoration: none;
      }
      button.button div.cooldown {
        position: absolute;
        top: 0px;
        left: 0px;
        z-index: -1;
        height: 100%;
        background-color: #DDDDDD;
      }
      button.button div.tooltip {
        width: 100px;
      }

      /* The corner menu's pause control (main.css's .menu span). */
      .menu button {
        cursor: pointer;
        float: right;
        margin-left: 20px;
      }
      .menu button:hover {
        text-decoration: underline;
      }

      /* The end screen's options sit inline between their <br>s, as the
         original's spans did (space.css). */
      button.endGameOption {
        display: inline-block;
      }

      /* The pause sheet (a port addition: the original has no global pause). */
      #pauseOverlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.96);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: default;
        font-size: 20px;
      }
      #pauseOverlay .resumeBtn {
        margin-top: 24px;
        cursor: pointer;
        text-decoration: underline;
      }

      /* A fresh notification's fade-in (printMessage's 500ms animate). */
      @keyframes notifyFade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #notifications div.notification {
        animation: notifyFade 500ms linear;
      }

      /* The Outside right-hand column: the village box flows above the
         stores (Engine.moveStoresView's measured village.height() + 26px,
         by normal flow instead). */
      #storesColumn {
        position: absolute;
        top: 0;
        right: 0;
      }
      #storesColumn #village {
        position: relative;
        top: auto;
        right: auto;
        margin-bottom: 26px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
    <script>
      // The service worker keeps the game playable offline (it's a
      // single-page world; everything caches well).
      if ("serviceWorker" in navigator && location.protocol === "https:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>
