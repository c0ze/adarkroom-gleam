# CodeRabbit configuration — https://docs.coderabbit.ai/guides/configure-coderabbit
# The port integrates on the `gleam-port` branch (the repo default branch,
# `master`, still holds the reference JS). CodeRabbit skips non-default base
# branches by default, so enable auto-review for `gleam-port` too.
language: en-US
reviews:
  profile: chill
  auto_review:
    enabled: true
    base_branches:
      - master
      - gleam-port
